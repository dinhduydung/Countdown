<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ứng dụng đếm ngược Hoàn Chỉnh</title>
<style>
  body { font-family: Arial, sans-serif; background: #fff; margin: 5px; }
  .row { display: flex; flex-wrap: wrap; margin-bottom: 5px; }
  .container-cells { display: flex; flex-wrap: wrap; justify-content: flex-start; }
  .button, .cell {
    display: flex; justify-content: center; align-items: center;
    border: 1px solid #ccc; margin: 2px;
    width: 60px; height: 60px;
    font-size: 12px; font-weight: bold; position: relative;
    border-radius: 8px; user-select: none;
  }
  .button { background-color: #4CAF50; color: white; cursor: pointer; }
  .cell { background-color: #fff; color: #000; cursor: pointer; }
  .selected { background-color: #FF69B4 !important; }
  .expired { animation: blink 1s infinite; background-color: red !important; color: white; }
  @keyframes blink { 50% { opacity: 0.4; } }
  .undo { position: absolute; top: 2px; left: 3px; font-size: 10px; color: blue; }
  .stop { position: absolute; bottom: 2px; left: 3px; font-size: 10px; color: red; }
  .exchange { position: absolute; bottom: 2px; right: 3px; font-size: 10px; color: green; }
  .cell-content-wrapper { display: flex; flex-direction: column; align-items: center; }
  .time { font-size: 14px; font-weight: bold; margin-top: 2px; }
</style>
</head>
<body>

<div class="row" id="row-minutes-top"></div>
<div class="container-cells" id="main-cells-container"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, serverTimestamp, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyBIqFzPL-tob4Lu1Xjg5tjCJeknYhiZmV0", 
    authDomain: "countdown1-45507.firebaseapp.com", 
    databaseURL: "https://countdown1-45507-default-rtdb.asia-southeast1.firebasedatabase.app", 
    projectId: "countdown1-45507", 
    storageBucket: "countdown1-45507.firebasestorage.app", 
    messagingSenderId: "565185644071", 
    appId: "1:565185644071:web:dc90993788fc847248f002", 
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  let sentStatus = {}; 

  // QUAN TRỌNG: Dùng push để lệnh không bị đè nhau
  function notifyESP(label, action) {
    const commandsRef = ref(database, 'esp_commands');
    push(commandsRef, {
      id: String(label),
      lenh: action,
      t: serverTimestamp() 
    });
  }

  const timersRef = ref(database, 'timers');
  const minuteButtons = [0.2, 5, 10, 20, 30, 60];
  const rowTop = document.getElementById('row-minutes-top');
  
  minuteButtons.forEach(min => {
    const btn = document.createElement('div');
    btn.className = 'button';
    btn.textContent = min + 'm';
    btn.onclick = () => selectMinute(min);
    rowTop.appendChild(btn);
  });

  let allCells = {};
  let selectedCell = null;

  function createCells() {
    const container = document.getElementById('main-cells-container');
    for (let i = 1; i <= 160; i++) {
      const label = String(i);
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.innerHTML = `<div class="undo">↩</div><div class="stop">Tắt</div><div class="exchange">Đổi</div>
                        <div class="cell-content-wrapper"><div class="number">${label}</div><div class="time"></div></div>`;
      
      cell.querySelector('.stop').onclick = (e) => { e.stopPropagation(); resetCell(label); };
      cell.onclick = () => {
        Object.values(allCells).forEach(c => c.cell.classList.remove('selected'));
        selectedCell = label;
        cell.classList.add('selected');
      };
      
      container.appendChild(cell);
      allCells[label] = { cell, timeEl: cell.querySelector('.time'), timer: null };
    }
  }
  createCells();

  function selectMinute(min) {
    if (!selectedCell) return alert("Hãy chọn một ô!");
    set(ref(database, 'timers/' + selectedCell), { 
        durationSeconds: min * 60, 
        startTime: serverTimestamp() 
    });
    sentStatus[selectedCell] = false;
    notifyESP(selectedCell, "OFF");
    selectedCell = null;
    Object.values(allCells).forEach(c => c.cell.classList.remove('selected'));
  }

  function resetCell(label) {
    remove(ref(database, 'timers/' + label));
    notifyESP(label, "OFF");
    sentStatus[label] = false;
  }

  let serverTimeOffset = 0;
  onValue(ref(database, '.info/serverTimeOffset'), snap => serverTimeOffset = snap.val());

  onValue(timersRef, (snapshot) => {
    const data = snapshot.val() || {};
    const now = Date.now() + serverTimeOffset;

    Object.keys(allCells).forEach(label => {
      const cellData = allCells[label];
      const timerData = data[label];

      if (timerData) {
        const elapsed = Math.floor((now - timerData.startTime) / 1000);
        const remaining = Math.max(0, timerData.durationSeconds - elapsed);

        if (remaining <= 0) {
          cellData.cell.classList.add('expired');
          cellData.timeEl.textContent = "HẾT";
          if (!sentStatus[label]) {
            notifyESP(label, "ON");
            sentStatus[label] = true;
          }
        } else {
          cellData.cell.classList.remove('expired');
          cellData.timeEl.textContent = Math.floor(remaining/60) + ":" + String(remaining%60).padStart(2,'0');
        }
      } else {
        cellData.cell.classList.remove('expired');
        cellData.timeEl.textContent = "";
      }
    });
  });
</script>
</body>
</html>
