<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown - On/Off Chuẩn</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 10px; }
  .row-top { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  .container-cells { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-start; }
  .btn-min, .cell {
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    width: 65px; height: 65px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s;
  }
  .btn-min { background: #4CAF50; color: white; border: none; font-size: 14px; }
  .btn-min:active { transform: scale(0.9); }
  .cell { background: white; border: 1px solid #ddd; position: relative; font-size: 11px; color: #333; }
  .selected { border: 3px solid #FF69B4 !important; background: #fff0f5; }
  .expired { background: #ff4d4d !important; color: white !important; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.6; } }
  .time-text { font-size: 16px; margin-top: 5px; }
  .label-text { color: #888; font-size: 10px; }
  .btn-action { position: absolute; font-size: 10px; padding: 2px; }
  .off-btn { bottom: 2px; left: 5px; color: red; }
  .exch-btn { bottom: 2px; right: 5px; color: blue; }
</style>
</head>
<body>

<div class="row-top" id="minutes-bar"></div>
<div class="container-cells" id="cells-grid"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyBIqFzPL-tob4Lu1Xjg5tjCJeknYhiZmV0", 
    authDomain: "countdown1-45507.firebaseapp.com", 
    databaseURL: "https://countdown1-45507-default-rtdb.asia-southeast1.firebasedatabase.app", 
    projectId: "countdown1-45507", 
    appId: "1:565185644071:web:dc90993788fc847248f002" 
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let selectedId = null, offset = 0;
  const cellNodes = {};

  // Đồng bộ thời gian máy chủ để tránh đứng giây
  onValue(ref(db, '.info/serverTimeOffset'), s => offset = s.val() || 0);

  // Tạo nút chọn phút
  [5, 10, 20, 30, 60].forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'btn-min'; btn.textContent = m + 'm';
    btn.onclick = () => {
      if(!selectedId) return alert("Chọn 1 ô trước!");
      set(ref(db, 'timers/' + selectedId), { start: serverTimestamp(), dur: m * 60 });
      set(ref(db, 'esp_commands'), { id: selectedId, lenh: "OFF", t: Date.now() });
      selectedId = null; updateSelection();
    };
    document.getElementById('minutes-bar').appendChild(btn);
  });

  // Tạo 160 ô lưới
  const grid = document.getElementById('cells-grid');
  for(let i=1; i<=160; i++) {
    const id = String(i);
    const div = document.createElement('div');
    div.className = 'cell';
    div.innerHTML = `<span class="label-text">${id}</span><span class="time-text"></span>
                     <span class="btn-action off-btn">Tắt</span>`;
    
    div.onclick = () => { selectedId = id; updateSelection(); };
    div.querySelector('.off-btn').onclick = (e) => {
      e.stopPropagation();
      remove(ref(db, 'timers/' + id));
      set(ref(db, 'esp_commands'), { id: id, lenh: "OFF", t: Date.now() });
    };

    grid.appendChild(div);
    cellNodes[id] = { el: div, txt: div.querySelector('.time-text'), sent: false };
  }

  function updateSelection() {
    Object.keys(cellNodes).forEach(id => {
      cellNodes[id].el.classList.toggle('selected', selectedId === id);
    });
  }

  // Lắng nghe dữ liệu và cập nhật giây
  onValue(ref(db, 'timers'), snap => {
    const data = snap.val() || {};
    const now = Date.now() + offset;

    Object.keys(cellNodes).forEach(id => {
      const timer = data[id];
      const node = cellNodes[id];

      if(timer && timer.start) {
        const elapsed = Math.floor((now - timer.start) / 1000);
        const rem = Math.max(0, timer.dur - elapsed);

        if(rem > 0) {
          node.txt.textContent = Math.floor(rem/60) + ":" + String(rem%60).padStart(2,'0');
          node.el.classList.remove('expired');
          node.sent = false;
        } else {
          node.txt.textContent = "HẾT";
          node.el.classList.add('expired');
          // Gửi lệnh ON lên ESP32
          if(!node.sent) {
            set(ref(db, 'esp_commands'), { id: id, lenh: "ON", t: Date.now() });
            node.sent = true;
          }
        }
      } else {
        node.txt.textContent = "";
        node.el.classList.remove('expired');
        node.sent = false;
      }
    });
  });
</script>
</body>
</html>
