<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ứng dụng đếm ngược - Fix Triệt Để Hardware</title>
<style>
  /* Giữ nguyên phần CSS cũ của bạn */
  body { font-family: Arial, sans-serif; background: #fff; margin: 5px; }
  .row { display: flex; flex-wrap: wrap; margin-bottom: 5px; }
  .container-cells { display: flex; flex-wrap: wrap; justify-content: flex-start; }
  .button, .cell { display: flex; justify-content: center; align-items: center; border: 1px solid #ccc; margin: 2px; width: 60px; height: 60px; font-size: 12px; font-weight: bold; position: relative; border-radius: 8px; user-select: none; }
  .button { background-color: #4CAF50; color: white; }
  .select-multiple-button { background-color: lightgreen; color: #000; margin-left: 20px; min-width: 80px; }
  .select-multiple-button.active { background-color: lightpink; }
  .cell { background-color: #fff; color: #000; }
  .selected { background-color: #FF69B4 !important; }
  .expired { animation: blink 1s infinite; background-color: red !important; color: white; }
  @keyframes blink { 50% { opacity: 0.4; } }
  .undo, .stop, .exchange { position: absolute; font-size: 10px; cursor: pointer; }
  .undo { top: 2px; left: 3px; color: blue; }
  .stop { bottom: 2px; left: 3px; color: red; }
  .exchange { bottom: 2px; right: 3px; color: green; }
  .cell-content-wrapper { text-align: center; }
  .time { font-size: 14px; font-weight: bold; margin-top: 2px; }
</style>
</head>
<body>

<div class="row" id="row-minutes-top"></div>
<div class="container-cells" id="main-cells-container"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyBIqFzPL-tob4Lu1Xjg5tjCJeknYhiZmV0", 
    authDomain: "countdown1-45507.firebaseapp.com", 
    databaseURL: "https://countdown1-45507-default-rtdb.asia-southeast1.firebasedatabase.app", 
    projectId: "countdown1-45507"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  
  let serverTimeOffset = 0;
  onValue(ref(database, '.info/serverTimeOffset'), snap => serverTimeOffset = snap.val());

  // HÀM QUAN TRỌNG: Cập nhật danh sách các ô đang cháy đèn
  function updateActiveLampsOnFirebase() {
    const activeLabels = [];
    Object.keys(allCells).forEach(label => {
      if (allCells[label].isExpiredAndNotCleared) {
        activeLabels.push(label);
      }
    });
    // Gửi một chuỗi duy nhất, ví dụ: "1,2,5,12"
    set(ref(database, 'active_lamps'), activeLabels.join(','));
  }

  const timersRef = ref(database, 'timers');
  let allCells = {};
  let selectedCell = null;
  let isMultipleSelectionMode = false;
  let selectedCellsForMultiple = new Set();

  // Tạo 160 ô
  const container = document.getElementById('main-cells-container');
  for (let i = 1; i <= 160; i++) {
    const label = String(i);
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `<div class="stop">Tắt</div><div class="cell-content-wrapper"><div class="number">${label}</div><div class="time"></div></div>`;
    
    cell.querySelector('.stop').onclick = (e) => { e.stopPropagation(); resetCell(label); };
    cell.onclick = () => {
      if (isMultipleSelectionMode) {
        if (selectedCellsForMultiple.has(label)) { selectedCellsForMultiple.delete(label); cell.classList.remove('selected'); }
        else { selectedCellsForMultiple.add(label); cell.classList.add('selected'); }
      } else {
        if (selectedCell === label) { selectedCell = null; cell.classList.remove('selected'); }
        else { 
            if (selectedCell) allCells[selectedCell].cell.classList.remove('selected');
            selectedCell = label; cell.classList.add('selected'); 
        }
      }
    };
    container.appendChild(cell);
    allCells[label] = { cell, timer: null, remaining: 0, isExpiredAndNotCleared: false, timeEl: cell.querySelector('.time') };
  }

  function resetCell(label) {
    remove(ref(database, 'timers/' + label));
  }

  // Nút chọn phút
  const rowTop = document.getElementById('row-minutes-top');
  [0.2, 5, 10, 20, 30].forEach(min => {
    const btn = document.createElement('div');
    btn.className = 'button';
    btn.textContent = min;
    btn.onclick = () => {
      const nowTs = serverTimestamp();
      if (isMultipleSelectionMode) {
        selectedCellsForMultiple.forEach(l => {
          set(ref(database, 'timers/' + l), { durationSeconds: min * 60, startTime: nowTs });
        });
        toggleMultipleSelectionMode();
      } else if (selectedCell) {
        set(ref(database, 'timers/' + selectedCell), { durationSeconds: min * 60, startTime: nowTs });
        selectedCell = null;
        Object.values(allCells).forEach(c => c.cell.classList.remove('selected'));
      }
    };
    rowTop.appendChild(btn);
  });

  const mBtn = document.createElement('div');
  mBtn.className = 'button select-multiple-button';
  mBtn.textContent = 'Chọn nhiều';
  mBtn.onclick = toggleMultipleSelectionMode;
  rowTop.appendChild(mBtn);

  function toggleMultipleSelectionMode() {
    isMultipleSelectionMode = !isMultipleSelectionMode;
    mBtn.classList.toggle('active', isMultipleSelectionMode);
    selectedCellsForMultiple.clear();
    Object.values(allCells).forEach(c => c.cell.classList.remove('selected'));
  }

  // Lắng nghe dữ liệu
  onValue(timersRef, (snapshot) => {
    const data = snapshot.val() || {};
    const now = Date.now() + serverTimeOffset;
    let hasChange = false;

    Object.keys(allCells).forEach(label => {
      const cellData = allCells[label];
      const timer = data[label];

      if (timer) {
        const remaining = Math.max(0, timer.durationSeconds - Math.floor((now - timer.startTime) / 1000));
        cellData.timeEl.textContent = remaining > 0 ? Math.floor(remaining/60) + ":" + String(remaining%60).padStart(2,'0') : "";
        
        if (remaining <= 0) {
          if (!cellData.isExpiredAndNotCleared) { cellData.isExpiredAndNotCleared = true; hasChange = true; }
          cellData.cell.classList.add('expired');
        } else {
          if (cellData.isExpiredAndNotCleared) { cellData.isExpiredAndNotCleared = false; hasChange = true; }
          cellData.cell.classList.remove('expired');
        }
      } else {
        if (cellData.isExpiredAndNotCleared) { cellData.isExpiredAndNotCleared = false; hasChange = true; }
        cellData.cell.classList.remove('expired');
        cellData.timeEl.textContent = "";
      }
    });

    if (hasChange) updateActiveLampsOnFirebase();
  });
</script>
</body>
</html>
